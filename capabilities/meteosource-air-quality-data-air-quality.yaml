naftiko: 1.0.0-alpha2
info:
  label: MeteoSource Air Quality Data API — Air Quality
  description: 'MeteoSource Air Quality Data API — Air Quality. 1 operations. Lead operation: Get point air quality forecast.
    Self-contained Naftiko capability covering one Meteosource Air Quality Data Api business surface.'
  tags:
  - Meteosource Air Quality Data Api
  - Air Quality
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    METEOSOURCE_AIR_QUALITY_DATA_API_API_KEY: METEOSOURCE_AIR_QUALITY_DATA_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: meteosource-air-quality-data-air-quality
    baseUri: https://www.meteosource.com/api/v1
    description: MeteoSource Air Quality Data API — Air Quality business capability. Self-contained, no shared references.
    resources:
    - name: flexi-air_quality
      path: /flexi/air_quality
      operations:
      - name: getairquality
        method: GET
        description: Get point air quality forecast
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: key
      value: '{{env.METEOSOURCE_AIR_QUALITY_DATA_API_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: meteosource-air-quality-data-air-quality-rest
    port: 8080
    description: REST adapter for MeteoSource Air Quality Data API — Air Quality. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/flexi/air-quality
      name: flexi-air-quality
      description: REST surface for flexi-air_quality.
      operations:
      - method: GET
        name: getairquality
        description: Get point air quality forecast
        call: meteosource-air-quality-data-air-quality.getairquality
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: meteosource-air-quality-data-air-quality-mcp
    port: 9090
    transport: http
    description: MCP adapter for MeteoSource Air Quality Data API — Air Quality. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-point-air-quality-forecast
      description: Get point air quality forecast
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meteosource-air-quality-data-air-quality.getairquality
      outputParameters:
      - type: object
        mapping: $.
