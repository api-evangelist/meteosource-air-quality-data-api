naftiko: 1.0.0-alpha2
info:
  label: MeteoSource Air Quality Data API
  description: MeteoSource provides an Air Quality API delivering hour-by-hour pollution data for any location on Earth, with
    forecasts up to 5 days ahead. The API also offers weather forecast data, location lookup, weather maps, and historical
    Time Machine data.
  tags:
  - Meteosource
  - Air
  - Quality
  - Data
  - Api
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: meteosource-air-quality-data-api
    baseUri: https://www.meteosource.com/api/v1
    description: MeteoSource Air Quality Data API HTTP API.
    authentication:
      type: apikey
      in: query
      name: key
      value: '{{METEOSOURCE_AIR_QUALITY_DATA_API_TOKEN}}'
    resources:
    - name: free-point
      path: /free/point
      operations:
      - name: getfreepointweather
        method: GET
        description: Get point weather forecast (free tier)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: flexi-point
      path: /flexi/point
      operations:
      - name: getflexipointweather
        method: GET
        description: Get point weather forecast (flexi tier)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: flexi-air-quality
      path: /flexi/air_quality
      operations:
      - name: getairquality
        method: GET
        description: Get point air quality forecast
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: free-find-places
      path: /free/find_places
      operations:
      - name: findplaces
        method: GET
        description: Find places by name or ZIP
        inputParameters:
        - name: text
          in: query
          type: string
          required: true
        - name: language
          in: query
          type: string
        - name: area
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: free-find-places-prefix
      path: /free/find_places_prefix
      operations:
      - name: findplacesbyprefix
        method: GET
        description: Find places by prefix
        inputParameters:
        - name: text
          in: query
          type: string
          required: true
        - name: language
          in: query
          type: string
        - name: area
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: free-nearest-place
      path: /free/nearest_place
      operations:
      - name: findnearestplace
        method: GET
        description: Find nearest place to coordinates
        inputParameters:
        - name: language
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: flexi-map
      path: /flexi/map
      operations:
      - name: getmap
        method: GET
        description: Get weather or pollution map
        inputParameters:
        - name: tile_x
          in: query
          type: integer
        - name: tile_y
          in: query
          type: integer
        - name: tile_zoom
          in: query
          type: integer
        - name: min_lat
          in: query
          type: number
        - name: min_lon
          in: query
          type: number
        - name: max_lat
          in: query
          type: number
        - name: max_lon
          in: query
          type: number
        - name: variable
          in: query
          type: string
          required: true
        - name: datetime
          in: query
          type: string
        - name: format
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: flexi-time-machine
      path: /flexi/time_machine
      operations:
      - name: gettimemachine
        method: GET
        description: Get historical Time Machine data
        inputParameters:
        - name: date
          in: query
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: meteosource-air-quality-data-api-rest
    description: REST adapter for MeteoSource Air Quality Data API.
    resources:
    - path: /free/point
      name: getfreepointweather
      operations:
      - method: GET
        name: getfreepointweather
        description: Get point weather forecast (free tier)
        call: meteosource-air-quality-data-api.getfreepointweather
        outputParameters:
        - type: object
          mapping: $.
    - path: /flexi/point
      name: getflexipointweather
      operations:
      - method: GET
        name: getflexipointweather
        description: Get point weather forecast (flexi tier)
        call: meteosource-air-quality-data-api.getflexipointweather
        outputParameters:
        - type: object
          mapping: $.
    - path: /flexi/air_quality
      name: getairquality
      operations:
      - method: GET
        name: getairquality
        description: Get point air quality forecast
        call: meteosource-air-quality-data-api.getairquality
        outputParameters:
        - type: object
          mapping: $.
    - path: /free/find_places
      name: findplaces
      operations:
      - method: GET
        name: findplaces
        description: Find places by name or ZIP
        call: meteosource-air-quality-data-api.findplaces
        outputParameters:
        - type: object
          mapping: $.
    - path: /free/find_places_prefix
      name: findplacesbyprefix
      operations:
      - method: GET
        name: findplacesbyprefix
        description: Find places by prefix
        call: meteosource-air-quality-data-api.findplacesbyprefix
        outputParameters:
        - type: object
          mapping: $.
    - path: /free/nearest_place
      name: findnearestplace
      operations:
      - method: GET
        name: findnearestplace
        description: Find nearest place to coordinates
        call: meteosource-air-quality-data-api.findnearestplace
        outputParameters:
        - type: object
          mapping: $.
    - path: /flexi/map
      name: getmap
      operations:
      - method: GET
        name: getmap
        description: Get weather or pollution map
        call: meteosource-air-quality-data-api.getmap
        outputParameters:
        - type: object
          mapping: $.
    - path: /flexi/time_machine
      name: gettimemachine
      operations:
      - method: GET
        name: gettimemachine
        description: Get historical Time Machine data
        call: meteosource-air-quality-data-api.gettimemachine
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: meteosource-air-quality-data-api-mcp
    transport: http
    description: MCP adapter for MeteoSource Air Quality Data API for AI agent use.
    tools:
    - name: getfreepointweather
      description: Get point weather forecast (free tier)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
