naftiko: 1.0.0-alpha2
info:
  label: MeteoSource Air Quality Data API — Weather
  description: 'MeteoSource Air Quality Data API — Weather. 2 operations. Lead operation: Get point weather forecast (flexi
    tier). Self-contained Naftiko capability covering one Meteosource Air Quality Data Api business surface.'
  tags:
  - Meteosource Air Quality Data Api
  - Weather
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    METEOSOURCE_AIR_QUALITY_DATA_API_API_KEY: METEOSOURCE_AIR_QUALITY_DATA_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: meteosource-air-quality-data-weather
    baseUri: https://www.meteosource.com/api/v1
    description: MeteoSource Air Quality Data API — Weather business capability. Self-contained, no shared references.
    resources:
    - name: flexi-point
      path: /flexi/point
      operations:
      - name: getflexipointweather
        method: GET
        description: Get point weather forecast (flexi tier)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: free-point
      path: /free/point
      operations:
      - name: getfreepointweather
        method: GET
        description: Get point weather forecast (free tier)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: key
      value: '{{env.METEOSOURCE_AIR_QUALITY_DATA_API_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: meteosource-air-quality-data-weather-rest
    port: 8080
    description: REST adapter for MeteoSource Air Quality Data API — Weather. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/flexi/point
      name: flexi-point
      description: REST surface for flexi-point.
      operations:
      - method: GET
        name: getflexipointweather
        description: Get point weather forecast (flexi tier)
        call: meteosource-air-quality-data-weather.getflexipointweather
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/free/point
      name: free-point
      description: REST surface for free-point.
      operations:
      - method: GET
        name: getfreepointweather
        description: Get point weather forecast (free tier)
        call: meteosource-air-quality-data-weather.getfreepointweather
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: meteosource-air-quality-data-weather-mcp
    port: 9090
    transport: http
    description: MCP adapter for MeteoSource Air Quality Data API — Weather. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-point-weather-forecast-flexi
      description: Get point weather forecast (flexi tier)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meteosource-air-quality-data-weather.getflexipointweather
      outputParameters:
      - type: object
        mapping: $.
    - name: get-point-weather-forecast-free
      description: Get point weather forecast (free tier)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meteosource-air-quality-data-weather.getfreepointweather
      outputParameters:
      - type: object
        mapping: $.
